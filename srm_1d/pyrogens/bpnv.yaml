# Boron/KNO3/Viton (BPNV), 25:60:15 by mass.
# DeMar 2021 reports W ~= 5000 psi*in^3/g and heat flux ~= 69 cal/cm^2/s.
#
# Saint-Robert values: seed `a=2.0e-5, n=0.50` PRESERVED in this
# YAML pending v0.7.4 Phase C re-LHS calibration.
#
# **Literature target (NOT YET ADOPTED — calibration debt)**:
# Mizushima et al. 2016, "Burning Rate Measurements of 3.2-mm-dia.
# BKNO3 Pellets in Low Pressures," J. Japan Soc. Aeron. Sp. Sci.
# 64(2). Measured r = 71.1 · P^0.589 (mm/s, MPa), valid 5 kPa -
# 7 MPa. SI conversion: a = 3.50e-5 m/(s·Pa^n), n = 0.589. With
# the BPNV binder correction (Mizushima used B:KNO3:NC=28:70:2 at
# 2% binder; BPNV is 25:60:15 with 15% Viton): expected band
# a ∈ (2.8e-5, 3.5e-5), n = 0.589.
#
# Why deferred: v0.7.4 Phase C.1 (2026-05-25) verified that swapping
# the seed → literature values triggers numerical collapse on the
# Hasegawa A example at default v0.7.0 calibration knobs. The new
# n=0.589 amplifies pressure-feedback transients enough that other
# knobs (roughness, kappa, T_ignition) need re-tuning before the
# lit value can be adopted. Re-LHS is the v0.7.4 Phase C scope.
# See srm_1d/docs/v0_7_3/references/pyrogen_physical_params_lit_dive.md §1.
name: BPNV
a: 2.0e-5
n: 0.50
rho: 1700.0
# v0.8.x igniter gas-property fix (ProPep, BPNV 25:60:15 @ 1000 psi = chamber
# standard). ProPep chamber results: T = 2719 K, CP/CV(eff) = 1.1046, gas mols
# = 1.621/100g, condensed = 1.303/100g (= B(liq) 0.746 + BN(s) 0.557 exactly).
# Gas-phase mean MW = (100 g - 21.88 g condensed)/1.621 mol = 48.2 g/mol; the
# gas-frozen gamma from the gas molar Cp (13.679 cal/mol/K) is Cp/(Cp-R)=1.17
# (used here — the plenum models gas only; ProPep's 1.1046 includes the
# condensed-phase heat capacity). Replaces the prior M=0.030 / T=2800 / g=1.25
# whose impetus R*T/M = 6869 psi*in3/g was 2.1x the ProPep per-charge value
# (3245) and drove the low-mass ignition over-spike.
T_flame: 2719.0
M: 0.0482
gamma: 1.17
# DeMar 2021 cited W ~= 5000 psi*in3/g (reference only; the gas physics uses
# M/T/gamma/gas_mass_fraction above, which give a per-charge impetus of 3245).
impetus_W: 5000.0
# Condensed-phase split (ProPep @1000 psi): gas = 78.12 g per 100 g charge
# (1.621 mol gas-phase), condensed = 21.88 g (B(liq) 0.746 mol + BN(s) 0.557
# mol). Only this fraction pressurizes; the rest is condensed B/BN.
gas_mass_fraction: 0.781
heat_flux_cal_cm2_s: 69.4
# v0.7.2 Phase A: pyrogen axial distribution. L_jet = kappa_jet * d_throat
# is the exponential-decay length over which pyrogen mass / enthalpy /
# momentum are spread along the bore. BPNV is treated as a choked sonic
# axial-vent pyrogen → kappa_jet ~ 6-10 (Witze + Hersch/Rieser).
kappa_jet: 8.0
# v0.7.3 Phase B.3 / B.4: pellet-form pyrogen (typical amateur HPR
# BKNO3 binder pellets). 'demar' delivery uses the measured
# heat_flux_cal_cm2_s=69.4 (time-averaged). Switch to 'radiation' to
# diagnose with the Stefan-Boltzmann pellet-emission model instead;
# pellet_emissivity 0.7 is a defensible mid-range (lit range 0.5-0.9).
# BPNV exhaust is K/KOH-rich but non-aluminized → absorption length 1 m.
form: pellets
heat_delivery_mode: demar
pellet_emissivity: 0.7
radiation_absorption_length_m: 1.0
# v0.7.4 Phase C.1: explicit particle geometry replaces the v0.7.3 ×5
# pellets multiplier. Lit-cited via pyrogen physical params dive
# (srm_1d/docs/v0_7_3/references/pyrogen_physical_params_lit_dive.md §1).
# Industry-standard NASA/JAXA BKNO3 igniter pellet is 3.2 mm × 3.2 mm
# right cylinder (L/D = 1.0), measured by Mizushima 2016.
# Amateur HPR practice (QuickBurst/Apogee ProCast straw-cast) is
# wider: 1.5-5 mm diameter, L/D 1-3. We default to the industry-
# standard 3.2 mm × L/D=1.0 as the highest-confidence value;
# override per-run via run_from_ric(particle_diameter_m=, ...) if
# the motor uses larger amateur-cast pellets.
particle_diameter_m: 3.2e-3
particle_LD_ratio: 1.0
