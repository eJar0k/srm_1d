# Boron/KNO3/Viton (BPNV), 25:60:15 by mass.
# DeMar 2021 reports W ~= 5000 psi*in^3/g and heat flux ~= 69 cal/cm^2/s.
# Saint-Robert a is an approximate Phase 1 seed value pending measured data.
name: BPNV
a: 2.0e-5
n: 0.5
rho: 1700.0
T_flame: 2800.0
M: 0.030
gamma: 1.25
impetus_W: 5000.0
heat_flux_cal_cm2_s: 69.4
# v0.7.2 Phase A: pyrogen axial distribution. L_jet = kappa_jet * d_throat
# is the exponential-decay length over which pyrogen mass / enthalpy /
# momentum are spread along the bore. BPNV is treated as a choked sonic
# axial-vent pyrogen → kappa_jet ~ 6-10 (Witze + Hersch/Rieser).
kappa_jet: 8.0
# v0.7.3 Phase B.3 / B.4: pellet-form pyrogen (typical amateur HPR
# BKNO3 binder pellets). 'demar' delivery uses the measured
# heat_flux_cal_cm2_s=69.4 (time-averaged). Switch to 'radiation' to
# diagnose with the Stefan-Boltzmann pellet-emission model instead;
# pellet_emissivity 0.7 is a defensible mid-range (lit range 0.5-0.9).
# BPNV exhaust is K/KOH-rich but non-aluminized → absorption length 1 m.
form: pellets
heat_delivery_mode: demar
pellet_emissivity: 0.7
radiation_absorption_length_m: 1.0
