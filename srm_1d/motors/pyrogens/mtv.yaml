# Magnesium/Teflon/Viton (MTV).
# DeMar 2021 reports faster action and higher heat flux than BPNV, but
# substantially higher electrostatic sensitivity. Not the default.
#
# Saint-Robert values: `a=4.4e-5, n=0.35` ADOPTED v0.7.4 (2026-06-01),
# replacing the old `a=3.0e-5, n=0.50` seed which over-predicted the
# burn rate ~6-8× (30→120 mm/s @1→16 MPa) and was too pressure-sensitive.
#
# Provenance — primary strand-burner + flare data:
# - Kubota & Serizawa 1987, J.Prop.Power 3(4):303, DOI 10.2514/3.22990
#   (srm_1d/docs/references/kubota1987.pdf). Fig.3, N2-pressurized strand
#   burner, 0.3-7 MPa: igniter-grade 60/40 Mg/TF ≈ 5.5 mm/s @1 MPa,
#   ~13 mm/s @5 MPa → n≈0.35. MTV burn rate rises with Mg wt% (ξ up to
#   ~0.7); n "relatively constant" for high-Mg igniter grades.
# - Kuwahara/Koch 1999 PEP 24 (2.02 mm/s @ 0.1 MPa, ρ=1.60 flare datum).
# - Koch 2002 PEP 27 (MTV-IV); Williams 2013 PEP (~30% radiative fraction).
#
# a=4.4e-5, n=0.35 (SI: r=a·P^n, m/s, Pa) reproduces BOTH anchors:
# 2.46 mm/s @0.1 MPa (≈Kuwahara), 5.5 @1 MPa, ~14.5 @16 MPa (≈Kubota).
# MTV's defining LOW pressure exponent (n≈0.2-0.4) is honored.
#
# Validation (Chunc/machbusterNew head_basket): cut the ignition-spike
# over-prediction from 2.02× to 1.55× of the ~8.8 MPa plateau while
# preserving plateau + full ignition. The residual ~1.5× is the genuine
# ignition/erosive transient (Root B). Diagnostic: the spike tracks
# burn-rate MAGNITUDE, not the pressure-exponent feedback (re-anchored
# n-sweep: spike ~constant 1.9-2.0× as n varies 0.0-0.7 at fixed magnitude).
# See srm_1d/docs/v0_7_3/references/pyrogen_physical_params_lit_dive.md §2
# and reference_mtv_burn_rate_literature memory.
name: MTV
a: 4.4e-5
n: 0.35
rho: 1800.0
T_flame: 3000.0
M: 0.032
gamma: 1.22
impetus_W: 4700.0
heat_flux_cal_cm2_s: 110.0
# v0.7.2 Phase A: pyrogen axial distribution. L_jet = kappa_jet * d_throat.
# MTV is treated as a choked sonic axial-vent pyrogen → kappa_jet ~ 6-10
# (Witze + Hersch/Rieser).
kappa_jet: 8.0
# v0.7.3 Phase B.3 / B.4: pellet-form pyrogen (typical Mg/Teflon
# slugs/pellets). 'demar' delivery uses the measured
# heat_flux_cal_cm2_s=110 (time-averaged). Switch to 'radiation' to
# diagnose with Stefan-Boltzmann pellet emission. MTV exhaust includes
# MgO and carbon particles → absorption length 0.5 m (intermediate
# between clean BKNO3 and heavily aluminized).
form: pellets
heat_delivery_mode: demar
pellet_emissivity: 0.7
radiation_absorption_length_m: 0.5
# v0.7.4 Phase C.1: explicit particle geometry replaces the v0.7.3 ×5
# pellets multiplier. Lit-cited via pyrogen physical params dive
# (srm_1d/docs/v0_7_3/references/pyrogen_physical_params_lit_dive.md §2).
# MTV ignition pellets follow the same NASA convention as BKNO3:
# 3.2 mm × 3.2 mm right cylinder (L/D=1.0). Per Koch & Clément 2007
# review, decoy-flare-grade MTV uses larger 6 mm pellets, but igniter-
# grade MTV pellets match the BKNO3 standard. Override via
# run_from_ric(particle_diameter_m=, ...) for decoy-flare-style use.
particle_diameter_m: 3.2e-3
particle_LD_ratio: 1.0
