# Magnesium/Teflon/Viton (MTV).
# DeMar 2021 reports faster action and higher heat flux than BPNV, but
# substantially higher electrostatic sensitivity. Not the default.
# Saint-Robert a is an approximate Phase 1 seed value pending measured data.
name: MTV
a: 3.0e-5
n: 0.5
rho: 1800.0
T_flame: 3000.0
M: 0.032
gamma: 1.22
impetus_W: 4700.0
heat_flux_cal_cm2_s: 110.0
# v0.7.2 Phase A: pyrogen axial distribution. L_jet = kappa_jet * d_throat.
# MTV is treated as a choked sonic axial-vent pyrogen → kappa_jet ~ 6-10
# (Witze + Hersch/Rieser).
kappa_jet: 8.0
# v0.7.3 Phase B.3 / B.4: pellet-form pyrogen (typical Mg/Teflon
# slugs/pellets). 'demar' delivery uses the measured
# heat_flux_cal_cm2_s=110 (time-averaged). Switch to 'radiation' to
# diagnose with Stefan-Boltzmann pellet emission. MTV exhaust includes
# MgO and carbon particles → absorption length 0.5 m (intermediate
# between clean BKNO3 and heavily aluminized).
form: pellets
heat_delivery_mode: demar
pellet_emissivity: 0.7
radiation_absorption_length_m: 0.5
