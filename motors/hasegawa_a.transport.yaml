# Combustion gas transport for Hasegawa Propellant 1 (RPA EFFECTIVE values).
# Loaded automatically by openmotor_adapter when reading hasegawa_a.ric.
#
# v0.7.1 (2026-05-23) switched the default from frozen to effective per the
# `propellant.py` docstring directive (lines 27-36): the heat-transfer
# coefficient in srm_1d's Ma 2020 erosive-burning chain assumes effective
# transport. The frozen sibling is preserved at
# `hasegawa_a.frozen.transport.yaml` for diagnostic reference.
#
# Rationale for the v0.7.1 default change:
#   - The Phase 5 frozen-vs-effective LHS A/B confirmed that frozen-default
#     calibrations peg k_solid against its lower literature bound (0.20),
#     a free-parameter compensation for under-heat-transfer through the
#     gas film. Effective default settles k_solid at the literature center
#     (~0.30, Thakre & Yang).
#   - Effective k_gas under-predicts the Hasegawa A ignition spike by
#     ~11% — a structural artifact slated for v0.7.2+ (Z-N dynamic burn
#     rate or spatial ignition kernel work). Documented in DEVNOTES.
#
# mu: RPA outputs a single dynamic viscosity for both formulations;
#     matches the frozen sibling.
mu: 8.842e-5
k: 0.6517
Cp: 2764.0
